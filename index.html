<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Max & Jessie's Baby Registry (Demo)</title>
  <meta name="description" content="Demo version of Max & Jessie's baby registry, built on the Are.na API.">
  <meta name="theme-color" content="#ff0095">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Baby Registry Demo">
  <meta property="og:description" content="Demo version of a baby registry, built on the Are.na API.">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Baby Registry Demo">
  <meta name="twitter:description" content="Demo version of a baby registry, built on the Are.na API.">

  <link rel="stylesheet" href="https://use.typekit.net/qcb0sxc.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="site-header">
    <p class="header-eyebrow">Max &amp; Jessie's</p>
    <h1 class="header-title">Baby Registry</h1>
    <p class="header-subtitle">Demo version of Max & Jessie's baby registry. For more info or access to the "real" version, reach out to <a href="mailto:jessiechar@gmail.com">Jessie</a></p>
  </header>

  <nav class="filter-bar">
    <div class="filter-bar-left">
      <a href="/my-items" class="your-items-btn">Your Items</a>
    </div>
    <div class="status-filter">
      <select id="sort-select" class="sort-select">
        <option value="default">Default</option>
        <option value="recent">Recently Added</option>
        <option value="price-desc">Price: High→Low</option>
        <option value="price-asc">Price: Low→High</option>
        <option value="unclaimed">Unclaimed</option>
        <option value="claimed">Claimed</option>
      </select>
    </div>
  </nav>

  <main id="registry-grid" aria-live="polite" aria-label="Registry items"></main>

  <footer class="site-footer">
    <p>Questions? Reach us at <a href="mailto:jessiechar@gmail.com">jessiechar@gmail.com</a></p>
  </footer>

  <!-- Claim modal -->
  <dialog id="claim-modal" aria-modal="true" aria-labelledby="modal-title">
    <button class="modal-close" id="modal-cancel" aria-label="Close">✕</button>
    <h2 id="modal-title">Claim a gift</h2>
    <p class="modal-item-name"></p>
    <form id="claim-form" novalidate>
      <input type="hidden" name="recordId">
      <label class="form-label">
        Email
        <input name="email" type="email" required autocomplete="email" placeholder="jane@example.com">
      </label>
      <p class="form-note">The only list your email will be added to is a thank you list :-)</p>
<div class="modal-error" role="alert" hidden></div>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" id="modal-cancel-btn">Cancel</button>
        <button type="submit" class="btn-primary">Claim this gift→</button>
      </div>
    </form>
  </dialog>

  <div id="toast" role="status" aria-live="polite" hidden></div>

  <script src="js/app.js"></script>
</body>
</html>
